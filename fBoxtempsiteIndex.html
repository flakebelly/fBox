<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fBox — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    background: #0E0E0E;
    color: #B8AE9A;
    font-family: Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .logo {
    width: 110px;
    height: 110px;
    border-radius: 18px;
    margin-bottom: 2rem;
  }
  .overline {
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #9A7E4E;
    margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 400;
    color: #F0E4CF;
    letter-spacing: .04em;
    margin-bottom: .2em;
  }
  h1 .f { color: #C4A265; }
  .tagline {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: #8A8276;
    margin-bottom: 2.5rem;
  }
  .body-text {
    font-size: 1rem;
    margin-bottom: 1.5rem;
  }
  .contact {
    font-family: 'JetBrains Mono', monospace;
    font-size: .82rem;
    letter-spacing: .08em;
    color: #C4A265;
    text-decoration: none;
  }
  .contact:hover { color: #D4B87A; }
  .mailing-link {
    display: inline-block;
    margin-top: 1.2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .82rem;
    letter-spacing: .08em;
    color: #F0E4CF;
    text-decoration: none;
    border: 1px solid #9A7E4E;
    padding: .5rem 1.2rem;
    border-radius: 4px;
  }
  .mailing-link:hover {
    background: #9A7E4E;
    color: #0E0E0E;
  }
  footer {
    margin-top: 4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    color: #8A8276;
    opacity: .5;
  }
</style>
</head>
<body>
  <img src="fbox_logo.png" alt="fBox" class="logo">
  <p class="overline">Virtual Analogue Studio Ecosystem</p>
  <h1><span class="f">f</span>Box</h1>
  <p class="tagline">VST3 Plugins &amp; Console Environment</p>
  <p class="body-text">Official launch coming soon.</p>
  <a href="mailto:fboxaudio@gmail.com" class="contact">fboxaudio@gmail.com</a>
  <a href="https://fboxaudio.com/list" class="mailing-link">Stay in the loop</a>
  <footer>&copy; 2026 fBox. All rights reserved.</footer>
</body>
</html>
