<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - fBox Audio</title>
    <link rel="icon" type="image/png" href="fbox_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Source+Sans+3:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:#0E0E0E;--gold:#C4A265;--gold-dim:#9A7E4E;
            --cream:#F0E4CF;--cream-dim:#B8AE9A;--cream-faint:#8A8276;
            --font-display:'Playfair Display',Georgia,serif;
            --font-body:'Source Sans 3','Segoe UI',sans-serif;
            --font-mono:'JetBrains Mono','Consolas',monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-body);background:var(--bg-deep);color:var(--cream-dim);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 2rem;-webkit-font-smoothing:antialiased}
        body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px 256px}
        ::selection{background:var(--gold-dim);color:var(--bg-deep)}
        a{color:var(--gold);text-decoration:none;transition:color 0.3s}
        a:hover{color:var(--cream)}
        .code{font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:2rem}
        h1{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.5rem);font-weight:400;color:var(--cream);margin-bottom:1rem}
        .message{font-family:var(--font-display);font-style:italic;font-size:1.1rem;color:var(--cream-faint);margin-bottom:3rem}
        .home-link{display:inline-block;font-family:var(--font-mono);font-size:0.82rem;letter-spacing:0.1em;color:var(--gold);border:1px solid var(--gold-dim);padding:0.7rem 1.8rem;border-radius:4px;transition:background 0.3s,color 0.3s}
        .home-link:hover{background:var(--gold-dim);color:var(--bg-deep)}
    </style>
</head>
<body>
    <p class="code">404 - Page Not Found</p>
    <h1>Nothing on this channel.</h1>
    <p class="message">The page you are looking for does not exist or has been moved.</p>
    <a href="index.html" class="home-link">Back to home</a>
</body>
</html>
